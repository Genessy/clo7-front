services:
  clo7-api:
    image: antoineletailleur/clo7-api:latest
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      GOOGLE_APPLICATION_CREDENTIALS: /app/service-account.json
    volumes:
      - ./service-account.json:/app/service-account.json:ro

  closet-app:
    image: eliseomurillo9/closet-app:0.1.0-cached
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /opt/hf-cache
      PORT: "8000"
    volumes:
      - closet-model-cache:/opt/hf-cache

volumes:
  closet-model-cache: